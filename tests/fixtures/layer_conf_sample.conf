# Synthetic layer.conf for test_inspect_parse.py.
# Matches the structure produced by real Yocto layers.

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes*/*/*.bb \
            ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-example"
BBFILE_PATTERN_meta-example := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-example = "6"

LAYERVERSION_meta-example = "3"

LAYERDEPENDS_meta-example = "core openembedded-layer"

LAYERSERIES_COMPAT_meta-example = "scarthgap wrynose"
