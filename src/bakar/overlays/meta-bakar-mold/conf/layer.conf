# meta-bakar-mold: ships the mold linker recipe and mold.bbclass.
#
# bakar materializes this layer into <bsp_root>/.bakar/meta-bakar-mold and the
# mold tuning overlay adds it via kas `repos:`. Unlike meta-bakar-sccache, this
# layer carries a from-scratch mold recipe; compat was originally pinned to
# wrynose-only during planning, but the wrynose tree isn't stood up yet, so
# E2E testing starts on the existing scarthgap tree instead. Verified before
# widening: scarthgap's gcc_13.4.bb clears the >=12.1 floor -fuse-ld=mold
# needs and is fully C++20-capable for mold-native's CMake build.

# Make classes/ visible to INHERIT.
BBPATH .= ":${LAYERDIR}"

# Register the recipes this layer ships.
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-bakar-mold"
BBFILE_PATTERN_meta-bakar-mold = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-bakar-mold = "20"

LAYERVERSION_meta-bakar-mold = "1"
LAYERDEPENDS_meta-bakar-mold = "core"
LAYERSERIES_COMPAT_meta-bakar-mold = "scarthgap wrynose"
