# meta-bakar-sccache: a class-only layer that ships sccache.bbclass.
#
# bakar materializes this layer into <bsp_root>/.bakar/meta-bakar-sccache and
# the sccache tuning overlay adds it via kas `repos:`. It carries no recipes -
# only classes/sccache.bbclass - so its layer compatibility is intentionally
# broad.

# Make classes/ visible to INHERIT.
BBPATH .= ":${LAYERDIR}"

BBFILE_COLLECTIONS += "bakar-sccache"
BBFILE_PATTERN_bakar-sccache = "^${LAYERDIR}/"
BBFILE_PRIORITY_bakar-sccache = "20"

LAYERVERSION_bakar-sccache = "1"
LAYERDEPENDS_bakar-sccache = "core"
LAYERSERIES_COMPAT_bakar-sccache = "kirkstone scarthgap styhead walnascar wrynose"
