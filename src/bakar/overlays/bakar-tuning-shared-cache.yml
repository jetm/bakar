# Shared sstate/downloads mirror opt-in overlay.
#
# This overlay is configured by the `sstate_mirror_url` config key (or the
# `--sstate-mirror` CLI flag). It is never auto-loaded by bakar; bakar appends
# it automatically only when a mirror URL is set.
#
# What it does: points bitbake's sstate and downloads fetches at the configured
# HTTP mirror before going upstream, and connects to the Yocto Project hash
# equivalence server so tasks that already ran on other machines can reuse their
# sstate without rebuilding.
#
# The mirror URL is supplied at build time via the BAKAR_SSTATE_MIRROR_URL
# environment variable, which bakar exports from the configured sstate_mirror_url.
# If the variable is unset the mirror blocks expand to empty strings and bitbake
# falls through to upstream fetches unchanged.

header:
  version: 21

env:
  BAKAR_SSTATE_MIRROR_URL:

local_conf_header:
  bakar-tuning-shared-cache: |
    # Redirect sstate fetches to the configured mirror before going upstream.
    SSTATE_MIRRORS ?= "file://.* ${@os.environ.get('BAKAR_SSTATE_MIRROR_URL', '')}/sstate/PATH"
    # Redirect source downloads to the configured mirror before going upstream.
    PREMIRRORS:prepend = "ftp://.*/.* ${@os.environ.get('BAKAR_SSTATE_MIRROR_URL', '')}/downloads/ \n \
    http://.*/.* ${@os.environ.get('BAKAR_SSTATE_MIRROR_URL', '')}/downloads/ \n \
    https://.*/.* ${@os.environ.get('BAKAR_SSTATE_MIRROR_URL', '')}/downloads/ \n"
    # Connect to the Yocto Project hash equivalence server for cross-machine reuse.
    BB_HASHSERVE_UPSTREAM = "wss://hashserv.yoctoproject.org/ws"
