# ccache tuning overlay.
#
# Added by bakar whenever [build] ccache is on (the default), INCLUDING when
# sccache-dist is on. ccache and sccache both drive the same OE launcher slot
# (the CCACHE variable), but they are COMPLEMENTARY under the hybrid: ccache is
# the local object cache for the non-allowlisted recipe tail while sccache
# distributes the allowlisted heavy recipes (SCCACHE_INCLUDED_PN). When both are
# active this overlay's INHERIT += "ccache" lands before the sccache overlay's
# INHERIT += "sccache" (lower zz-bakar-NN key), so sccache.bbclass's per-recipe
# CCACHE override wins for allowlisted PNs and the ccache value stands for the
# rest. Selection lives in bakar.commands._helpers._ccache_extra_overlays (gated
# on cfg.ccache).
#
# Extracted from the per-family base overlays (generic/nxp/ti) so ccache is
# wired in exactly one place and only when actually used.

header:
  version: 21

local_conf_header:
  # Sort-last key (see bakar-tuning-generic): 20 orders ccache after the base
  # section and before the opt-in caches.
  zz-bakar-20-ccache: |
    # Neutral host-canonical default; bakar rewrites this per-mode at
    # materialize time (the real host dir on host, the kas-container cache
    # mount under --container). See steps.kas_build._inject_literal_ccache.
    CCACHE_DIR = "${TOPDIR}/ccache"
    INHERIT += "ccache"
    # Cap the build ccache. oe-core's CCACHE_CONFIGPATH (meta/conf/ccache.conf)
    # leaves max_size=0 (uncapped); exporting CCACHE_MAXSIZE puts it in the
    # do_compile env, where it overrides that config file. With [build]
    # ccache_shared this one cap governs the shared cache for every workspace;
    # export a larger CCACHE_MAXSIZE (it overrides this) when sharing widely.
    CCACHE_MAXSIZE = "50G"
    export CCACHE_MAXSIZE

    # nodejs uses a GYP-generated Makefile with fixup_dep() that writes
    # a .d.raw dependency file via -MF, then immediately reads it back.
    # ccache with hash_dir=false does not restore the .d.raw file on a
    # cache hit, causing fixup_dep() to fail with "No such file or directory".
    CCACHE_DISABLE:pn-nodejs = "1"
