# TI Sitara (Arago) tuning overlay.
#
# Layered on top of a topology-only kas YAML by `bakar build`. Carries
# the shared tuning head (ccache, fetch robustness, MIRRORS,
# PREMIRRORS, FETCHCMD_wget) plus TI-specific fork PREMIRRORs for
# ti-linux-kernel and ti-u-boot. ACCEPT_FSL_EULA and the renderdoc
# launcher fix are intentionally omitted - both are NXP/FSL specific.

header:
  version: 21

# PYTHONMALLOC=malloc is the round 11 Phase 2 ceiling fix
# (drops 3.14.4 GIL race rate ~50% -> ~5%). kas auto-appends each
# declared env var to BB_ENV_PASSTHROUGH_ADDITIONS at libkas.py:507,
# so bitbake's clean_environment lets it through to parser-pool
# workers. Host env wins on override.
env:
  PYTHONMALLOC: malloc
  # Passthrough-only (null = no default): bakar injects the per-run event-log
  # path via `docker -e`, but bitbake reads BB_DEFAULT_EVENTLOG from its
  # datastore (cooker.py), and clean_environment scrubs env vars not in
  # BB_ENV_PASSTHROUGH_ADDITIONS. Declaring it here makes kas whitelist it,
  # so the live build UI's event tailer finds the log at the run-dir path.
  # When unset, kas drops the null and OE-core's ?= default applies.
  BB_DEFAULT_EVENTLOG: null
  # Passthrough-only (null = no default): forwards the host SDKMACHINE so an
  # SDK target build (`SDKMACHINE=x86_64 bakar build ... --target ...`) picks
  # the SDK arch. Unset -> bitbake's SDKMACHINE default (the build host).
  SDKMACHINE: null
  # Passthrough-only (null = no default): bakar exports these from config.toml
  # [build] parallel_make / bb_number_threads so the thread lines below can
  # decouple compile -j from recipe concurrency. clean_environment scrubs vars
  # absent from BB_ENV_PASSTHROUGH_ADDITIONS, so they must be whitelisted here
  # to survive into the container. Unset -> the os.environ.get falls back to NPROC.
  BAKAR_PARALLEL_MAKE: null
  BAKAR_BB_NUMBER_THREADS: null

local_conf_header:
  bakar-tuning: |
    CCACHE_DIR = "/work/ccache"
    INHERIT += "ccache"
    # Cap the build ccache. oe-core's CCACHE_CONFIGPATH (meta/conf/ccache.conf)
    # leaves max_size=0 (uncapped); exporting CCACHE_MAXSIZE puts it in the
    # do_compile env, where it overrides that config file. With [build]
    # ccache_shared this one cap governs the shared cache for every workspace;
    # export a larger CCACHE_MAXSIZE (it overrides this) when sharing widely.
    CCACHE_MAXSIZE = "50G"
    export CCACHE_MAXSIZE
    # Decoupled parallelism: recipe concurrency (task + parse threads) is sized
    # to local RAM, compile -j to a distributed-compile cluster. bakar injects
    # BAKAR_BB_NUMBER_THREADS / BAKAR_PARALLEL_MAKE from config.toml [build] when
    # set; each falls back to NPROC (then 16) when absent, so a config without
    # the overrides reproduces the old NPROC-coupled behavior. Parse threads
    # follow the task thread count.
    BB_NUMBER_THREADS = "${@os.environ.get('BAKAR_BB_NUMBER_THREADS') or os.environ.get('NPROC', '16')}"
    PARALLEL_MAKE = "-j ${@os.environ.get('BAKAR_PARALLEL_MAKE') or os.environ.get('NPROC', '16')}"
    BB_NUMBER_PARSE_THREADS = "${@os.environ.get('BAKAR_BB_NUMBER_THREADS') or os.environ.get('NPROC', '16')}"

    BB_DISKMON_DIRS = " \
        STOPTASKS,${TMPDIR},1024,100K \
        HALT,${TMPDIR},512,50K \
        STOPTASKS,${DL_DIR},1024,100K \
        HALT,${DL_DIR},512,50K \
    "

    BB_PRESSURE_MAX_CPU = "${@os.environ.get('BB_PRESSURE_MAX_CPU', '')}"
    BB_PRESSURE_MAX_IO = "${@os.environ.get('BB_PRESSURE_MAX_IO', '')}"
    BB_PRESSURE_MAX_MEMORY = "${@os.environ.get('BB_PRESSURE_MAX_MEMORY', '')}"

    BB_SCHEDULER = "${@os.environ.get('BB_SCHEDULER', '')}"
    IMAGE_FEATURES:remove = "dev-pkgs dbg-pkgs tools-sdk tools-debug staticdev-pkgs"

    # Never peer with the public Yocto hashserv (hangs when unreachable).
    BB_HASHSERVE_UPSTREAM:forcevariable = ""

    # Fetch robustness: raise the per-URI timeout so transient TLS / DNS
    # stalls do not trip the default (~45s) and fail the task.
    BB_FETCH_TIMEOUT = "600"

    # Replace scarthgap's default MIRRORS table (which hardcodes the dead
    # sources.openembedded.org host) with a curated catch-all pointing at
    # the Yocto Project source mirror. Bitbake consults MIRRORS on the
    # fallback phase if the original URI failed.
    MIRRORS = " \
        git://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        ftp://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    # Try the yocto mirror BEFORE hitting github.com; this turns github
    # outages into silent fallbacks instead of build blockers. Falls
    # through to the original URI on miss.
    PREMIRRORS:prepend = " \
        git://github.com/.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://github.com/.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://github.com/.*/.*  http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    # crates.io 403 workaround (see NXP overlay for full reasoning).
    FETCHCMD_wget = "/usr/bin/env wget --tries=2 --timeout=100 -U 'bitbake/2.0'"

    PREMIRRORS:prepend = "git://github.com/varigit/ti-linux-kernel.* git:///work/forks/ti-linux-kernel;protocol=file \n "
    PREMIRRORS:prepend = "git://github.com/varigit/ti-u-boot.* git:///work/forks/ti-u-boot;protocol=file \n "

repos:
  meta-varis-overrides-ti:
    path: meta-varis-overrides-ti
    layers:
      .:
