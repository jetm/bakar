# Distributed-compile opt-in overlay (sccache-dist).
#
# Configured by the `sccache_dist` config key (or the `--sccache-dist` CLI
# flag). Never auto-loaded; bakar appends it only when sccache-dist is enabled.
#
# What it does: adds the bakar-provided meta-bakar-sccache layer (materialized
# into <bsp_root>/.bakar/meta-bakar-sccache) and inherits its sccache.bbclass,
# which routes eligible target compiles through sccache instead of ccache. All
# the policy - which recipes distribute, keeping the build/host compiler local,
# HOSTTOOLS, task network, the scheduler-URL export - lives in the class; see
# classes/sccache.bbclass for the rationale.
#
# ccache and sccache both take the compiler as their next argument (OE's CCACHE
# slot), but under the hybrid they are COMPLEMENTARY: the ccache overlay is
# co-selected whenever [build] ccache is on so ccache caches the non-allowlisted
# recipe tail while sccache distributes the allowlisted heavy recipes. The ccache
# overlay's INHERIT += "ccache" is ordered before this overlay's INHERIT +=
# "sccache" (lower zz-bakar-NN key), so sccache.bbclass's per-recipe CCACHE
# override wins for allowlisted PNs - no INHERIT:remove needed.
#
# The scheduler URL is supplied at build time via BAKAR_SCCACHE_SCHEDULER_URL,
# which bakar exports from the configured sccache_scheduler_url (host-mode path).
# Declaring it in the env block makes kas whitelist it through
# BB_ENV_PASSTHROUGH_ADDITIONS so the in-build sccache client can read it.

header:
  version: 21

env:
  # Passthrough-only (null = no default): bakar exports the scheduler target from
  # the configured sccache_scheduler_url. When unset, the sccache client falls
  # back to its own config (SCCACHE_CONF) or local-cache-only mode.
  BAKAR_SCCACHE_SCHEDULER_URL: null
  # Container-mode only: the auth config path and a writable disk-cache dir. The
  # token lives only in the config file (no env override) and HOME inside the
  # container is not the host HOME, so the client needs SCCACHE_CONF to find it;
  # the config's cache dir is absent in the container, so SCCACHE_DIR redirects
  # it to the container bind mount. Both stay null in host mode (the default),
  # where the sccache client reads its own config and host cache dir directly -
  # no /work involved. See sccache.bbclass.
  BAKAR_SCCACHE_CONF: null
  BAKAR_SCCACHE_DIR: null

repos:
  # bakar materializes this layer next to the overlay under .bakar/; the relative
  # path resolves against KAS_WORK_DIR (= bsp_root) in container mode and the
  # build CWD (= bsp_root) in host mode. No url/commit: kas treats it as an
  # unmanaged local layer (same pattern as the nxp meta-varis-overrides repo).
  meta-bakar-sccache:
    path: .bakar/meta-bakar-sccache
    layers:
      .:

local_conf_header:
  # Sort-last key (see bakar-tuning-generic): 50 orders sccache last among the
  # bakar overlays.
  zz-bakar-50-sccache: |
    # The ccache overlay (bakar-tuning-ccache, zz-bakar-20) is co-selected under
    # the hybrid, so INHERIT += "ccache" is already in local.conf above this line.
    # Inheriting sccache last lets sccache.bbclass's per-recipe CCACHE override win
    # for allowlisted PNs while ccache stays the launcher for the rest - no
    # INHERIT:remove needed.
    INHERIT += "sccache"
