# meta-bakar-host: bakar-provided layer carrying host-mode build fixes.
#
# bakar materializes this layer into <bsp_root>/.bakar/meta-bakar-host and the
# host tuning overlay (bakar-tuning-host.yml) adds it via kas `repos:`, but only
# when the resolved build runs in host mode. It currently carries one bbappend
# (rpm) that neutralises the rpm transaction plugins so rpm-native does not
# dlopen the build host's ABI-incompatible /usr/lib/rpm-plugins during do_rootfs;
# see recipes-devtools/rpm/rpm_%.bbappend.

# Make the layer's recipes/bbappends visible.
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "bakar-host"
BBFILE_PATTERN_bakar-host = "^${LAYERDIR}/"
BBFILE_PRIORITY_bakar-host = "20"

LAYERVERSION_bakar-host = "1"
LAYERDEPENDS_bakar-host = "core"
LAYERSERIES_COMPAT_bakar-host = "kirkstone scarthgap styhead walnascar wrynose"
