# meta-bakar-cache-classify: bakar-provided layer carrying the cache-visibility
# classification bbclass.
#
# bakar materializes this layer into <bsp_root>/.bakar/meta-bakar-cache-classify
# and the cache-classify tuning overlay (bakar-tuning-cache-classify.yml) adds it
# via kas `repos:`. It carries the bitbake class that classifies recipes by their
# cache visibility so the build UI can surface cache hit/miss state.

# Make the layer's recipes/bbappends visible.
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "cache-classify"
BBFILE_PATTERN_cache-classify = "^${LAYERDIR}/"
BBFILE_PRIORITY_cache-classify = "20"

LAYERVERSION_cache-classify = "1"
LAYERDEPENDS_cache-classify = "core"
LAYERSERIES_COMPAT_cache-classify = "kirkstone scarthgap styhead walnascar wrynose"
