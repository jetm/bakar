# Hash equivalence opt-in overlay.
#
# WARNING: enabling this overlay invalidates your existing sstate cache on
# the first run. Bitbake rebuilds all tasks whose signatures no longer match
# under OEEquivHash. Only add this overlay to a kas invocation after a full
# clean build or when you accept the one-time rebuild cost.
#
# Usage: add this file to the `includes:` list of your kas YAML after the
# standard tuning overlay. It is intentionally never auto-loaded by bakar.
#
# What it does: OEEquivHash lets bitbake treat tasks as equivalent when their
# outputs match, even if their input hashes differ (e.g. after a minor recipe
# change). Combined with BB_HASHSERVE_UPSTREAM, tasks that already ran on
# other machines can reuse their sstate via the shared hash equivalence server,
# skipping the rebuild entirely.

header:
  version: 21

local_conf_header:
  # Sort-last key (see bakar-tuning-generic): 30 orders hashequiv after the base
  # section, so its BB_HASHSERVE_UPSTREAM env-lookup correctly overrides the
  # base's plain `= ""` default (the base used to win via :forcevariable, which
  # also defeated this opt-in).
  zz-bakar-30-hashequiv: |
    # Switch the signature handler to equivalence-aware mode.
    BB_SIGNATURE_HANDLER = "OEEquivHash"
    # Run a local hash equivalence server and connect it to the upstream
    # Yocto Project server for cross-machine reuse.
    BB_HASHSERVE = "${@os.environ.get('BB_HASHSERVE', 'auto')}"
    # Co-locate the hash-equivalence DB with the (shared) sstate cache. Builds
    # that share SSTATE_DIR otherwise each keep a private DB inside their own
    # build dir, so an equivalence mapping computed by one build is invisible to
    # the next and cross-build/workspace sstate reuse never happens (OE warns
    # about exactly this when SSTATE_DIR is shared).
    BB_HASHSERVE_DB_DIR = "${SSTATE_DIR}"
    # Default the upstream to empty. For a private BSP with private sstate and
    # no public mirror, an armed upstream only causes a startup hang while
    # bitbake waits on the unreachable server and produces more sstate misses.
    # Empty is the safe default; opt in by exporting BB_HASHSERVE_UPSTREAM.
    BB_HASHSERVE_UPSTREAM = "${@os.environ.get('BB_HASHSERVE_UPSTREAM', '')}"
