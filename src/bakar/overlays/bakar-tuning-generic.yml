# Generic (BSP-agnostic) tuning overlay.
#
# Layered on top of any kas YAML that does not classify as NXP
# or TI. Carries the optimizations that apply to any bitbake build:
# fetch robustness (BB_FETCH_TIMEOUT + MIRRORS + PREMIRRORS for github.com)
# and PYTHONMALLOC=malloc to mitigate the 3.14 GIL parser-fork race. ccache
# wiring lives in the conditional bakar-tuning-ccache overlay (mutually
# exclusive with sccache); FETCHCMD_wget is left to the workspace's own fetch
# config (e.g. avocado's contact-bearing User-Agent) and only the NXP/TI
# overlays still carry a crates.io fallback.
#
# Excluded vs. the NXP/TI overlays: ACCEPT_FSL_EULA (NXP-only), the
# renderdoc CMake-launcher fix (only fires under
# packagegroup-fsl-tools-gpu-external), per-BSP fork PREMIRRORs (the
# the linux-imx / ti-linux-kernel / ti-u-boot forks are vendor-specific),
# and the meta-varis-overrides carry vendor patches.
#
# kas merges local_conf_header.<key> and repos.<name> by name, so the
# user's machine/distro/target/repos stay intact while these knobs are
# unioned in.

header:
  version: 21

# PYTHONMALLOC=malloc is the round 11 Phase 2 ceiling fix
# (drops 3.14.4 GIL race rate ~50% -> ~5%). kas auto-appends each
# declared env var to BB_ENV_PASSTHROUGH_ADDITIONS at libkas.py:507,
# so bitbake's clean_environment lets it through to parser-pool
# workers. Host env wins on override.
env:
  PYTHONMALLOC: malloc
  # Passthrough-only (null = no default): bakar injects the per-run event-log
  # path via `docker -e`, but bitbake reads BB_DEFAULT_EVENTLOG from its
  # datastore (cooker.py), and clean_environment scrubs env vars not in
  # BB_ENV_PASSTHROUGH_ADDITIONS. Declaring it here makes kas whitelist it,
  # so the live build UI's event tailer finds the log at the run-dir path.
  # When unset, kas drops the null and OE-core's ?= default applies.
  BB_DEFAULT_EVENTLOG: null
  # Passthrough-only (null = no default): forwards the host SDKMACHINE so
  # `SDKMACHINE=x86_64 bakar build --target avocado-complete` picks the SDK
  # arch (avocado-complete builds nativesdk/SDK packages). Unset -> bitbake's
  # SDKMACHINE default (the build host) applies.
  SDKMACHINE: null
  # Passthrough-only (null = no default): bakar exports these from config.toml
  # [build] parallel_make / bb_number_threads so the thread lines below can
  # decouple compile -j from recipe concurrency. clean_environment scrubs vars
  # absent from BB_ENV_PASSTHROUGH_ADDITIONS, so they must be whitelisted here
  # to survive into the container. Unset -> the os.environ.get falls back to NPROC.
  BAKAR_PARALLEL_MAKE: null
  BAKAR_BB_NUMBER_THREADS: null
  # Passthrough-only (null = no default): bakar supplies the host-mode launch
  # PATH (py_bin : bitbake_bin : buildtools_bindir : inherited) via _build_env.
  # The YAML literal is irrelevant because kas's get_environment prefers
  # os.environ['PATH']; declaring it here makes kas set the bitbake-launch PATH
  # from the live subprocess env so OE's HOSTTOOLS picks the pinned gcc.
  PATH: null

local_conf_header:
  # Sort-last key: kas emits local_conf_header entries sorted by key
  # (kas/config.py _get_conf_header), so the `zz-bakar-` prefix lands every
  # bakar section after the workspace's own keys - bakar's plain `=` then wins.
  # The numeric segment orders bakar's own overlays (10 base < 20 ccache < 30
  # hashequiv < 40 shared-cache < 50 sccache). ccache config lives in the
  # conditional bakar-tuning-ccache overlay now (mutually exclusive with sccache).
  zz-bakar-10-base: |
    # Decoupled parallelism: recipe concurrency (task + parse threads) is sized
    # to local RAM, compile -j to a distributed-compile cluster. bakar injects
    # BAKAR_BB_NUMBER_THREADS / BAKAR_PARALLEL_MAKE from config.toml [build] when
    # the user sets them; each falls back to NPROC (then 16) when absent, so a
    # config without the overrides reproduces the old NPROC-coupled behavior.
    BB_NUMBER_THREADS = "${@os.environ.get('BAKAR_BB_NUMBER_THREADS') or os.environ.get('NPROC', '16')}"
    PARALLEL_MAKE = "-j ${@os.environ.get('BAKAR_PARALLEL_MAKE') or os.environ.get('NPROC', '16')}"
    # Parse thread pool follows the task thread count (BB_NUMBER_THREADS), so the
    # bb_number_threads override governs both. Separating parse and task threads
    # lets parsing saturate available cores while tasks are still completing from
    # the previous wave.
    BB_NUMBER_PARSE_THREADS = "${@os.environ.get('BAKAR_BB_NUMBER_THREADS') or os.environ.get('NPROC', '16')}"

    # Abort the build before the disk fills up. STOPTASKS lets in-flight
    # tasks finish; HALT halts immediately. Thresholds in MiB.
    BB_DISKMON_DIRS = " \
        STOPTASKS,${TMPDIR},1024,100K \
        HALT,${TMPDIR},512,50K \
        STOPTASKS,${DL_DIR},1024,100K \
        HALT,${DL_DIR},512,50K \
    "

    # Renice bitbake tasks so interactive work stays responsive.
    BB_TASK_NICE_LEVEL = "5"
    # Class 2 (best-effort) I/O with data value 4: yields to foreground I/O
    # while still making progress on parallel builds.
    BB_TASK_IONICE_LEVEL = "2.4"

    # PSI (Pressure Stall Information) throttle thresholds, read from env
    # so bakar can inject machine-specific values from config.toml.
    # Empty string disables the check for that dimension.
    BB_PRESSURE_MAX_CPU = "${@os.environ.get('BB_PRESSURE_MAX_CPU', '')}"
    BB_PRESSURE_MAX_IO = "${@os.environ.get('BB_PRESSURE_MAX_IO', '')}"
    BB_PRESSURE_MAX_MEMORY = "${@os.environ.get('BB_PRESSURE_MAX_MEMORY', '')}"

    # Scheduler selection, injected from config.toml via bakar.
    # Options: speed (default), completion (better for HDD / rm_work builds),
    # basic (deterministic, slowest).
    BB_SCHEDULER = "${@os.environ.get('BB_SCHEDULER', '')}"

    # Opt-in: pre-seed mirror tarballs for VCS fetches.
    # When enabled, bitbake creates a .tar.gz of each VCS checkout in DL_DIR
    # so future fetches can use it as a local mirror. Disabled by default
    # because it adds time on the first fetch and grows DL_DIR significantly.
    # BB_GENERATE_MIRROR_TARBALLS = "1"
    IMAGE_FEATURES:remove = "dev-pkgs dbg-pkgs tools-sdk tools-debug staticdev-pkgs"

    # Fetch robustness: raise the per-URI timeout so transient TLS / DNS
    # stalls do not trip the default (~45s) and fail the task.
    BB_FETCH_TIMEOUT = "600"

    # Replace the distro's default MIRRORS table (poky scarthgap hardcodes
    # the dead sources.openembedded.org host) with a curated catch-all
    # pointing at the Yocto Project source mirror. Bitbake consults
    # MIRRORS on the fallback phase if the original URI failed.
    MIRRORS = " \
        git://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        ftp://.*/.*     http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    # Try the yocto mirror BEFORE hitting github.com; this turns github
    # outages into silent fallbacks instead of build blockers. Falls
    # through to the original URI on miss.
    PREMIRRORS:prepend = " \
        git://github.com/.*/.*    http://downloads.yoctoproject.org/mirror/sources/ \n \
        http://github.com/.*/.*   http://downloads.yoctoproject.org/mirror/sources/ \n \
        https://github.com/.*/.*  http://downloads.yoctoproject.org/mirror/sources/ \n \
    "

    # meta-erlang's mix.bbclass runs `mix deps.get` during do_configure with
    # network access enabled. The default Hex HTTP timeout (~60s) is too short
    # for hex.pm under congestion. HEX_HTTP_CONCURRENCY=1 avoids thundering-herd
    # on the single connection; HEX_HTTP_TIMEOUT raises the per-request limit.
    # `export` makes bitbake pass these to the task shell environment.
    export HEX_HTTP_CONCURRENCY = "1"
    export HEX_HTTP_TIMEOUT = "120"

    # Never peer with the public Yocto hashserv. Connecting to
    # wss://hashserv.yoctoproject.org/ws from inside the container hangs
    # task initialisation when the host is unreachable. The local
    # bakar-managed hashserv (BB_HASHSERVE) is used instead when running.
    # Plain `=` suffices now that the zz-bakar key sorts this section last, so it
    # already beats BSP-specific YAMLs (e.g. meta-avocado vendor/oe.yml). The
    # hashequiv overlay (sorting after this) overrides with an env-driven opt-in.
    BB_HASHSERVE_UPSTREAM = ""

    # Disable the connectivity sanity check. On a fresh parse OE fetches
    # https://www.yoctoproject.org/connectivity.html to probe network reach;
    # bitbake's fetcher cannot reach it in this build environment (host curl
    # can, the fetcher path cannot), so the check fails the build before any
    # task runs. All sources come from the shared DL_DIR, so the pre-build
    # reachability probe is pointless here. Empty disables it.
    CONNECTIVITY_CHECK_URIS = ""

    # Disable rm_work while bakar is in use. The kas-build-env container enables
    # it (AVOCADO_RM_WORK=1), which cleans recipe-sysroot-native after each task
    # and breaks recipes whose later tasks need native binaries (e.g.
    # do_stone_provision needs stone and fwup). INHERIT:remove misses the copy
    # meta-avocado adds via USER_CLASSES, so strip it there too; :remove applies
    # regardless of merge order. bakar materialization deletes both lines when
    # [build] rm_work=true (BAKAR_RM_WORK / .bakar.toml / config.toml).
    INHERIT:remove = "rm_work"
    USER_CLASSES:remove = "rm_work"
