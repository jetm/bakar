# Example kas YAML for a scarthgap (Yocto 5.0 LTS) minimal build on qemuarm64.
#
# scarthgap sibling of kas-qemuarm64-wrynose.yml. Only the release branches
# differ; the machine, distro, target, and layer stack are identical. Like the
# wrynose variant this drives a true cross-compile (aarch64 target on an x86_64
# host), which is the case sccache-dist must auto-package and ship a
# cross-toolchain for.
#
# Clones all repos from upstream at build time. Requires network access and
# a kas-container-compatible image with the Yocto build prerequisites.
#
# Layer coverage:
#   - openembedded-core/meta:      core Yocto recipes and classes (scarthgap)
#   - meta-openembedded sub-layers: meta-oe, meta-python, meta-networking,
#                                   meta-filesystems (scarthgap)
#
# meta-yocto/meta-poky ship a scarthgap branch (scarthgap is an LTS), so a
# `poky` distro is available here; nodistro is kept to stay parallel with the
# wrynose example and avoid pulling an extra layer.
#
# Bitbake:
#   scarthgap requires BB_MIN_VERSION = "2.8.0". The bitbake repo is cloned
#   with layers: {} so it is not added to bblayers.conf. kas-container checks
#   out all repos under /work/; oe-init-build-env then finds bitbake at
#   /work/layers/bitbake/ via its $OEROOT/../bitbake sibling search.
#
# Usage:
#   export KAS_CONTAINER_IMAGE=ghcr.io/siemens/kas/kas:5.2
#   bakar build examples/kas-qemuarm64-scarthgap.yml
#
# All repos are cloned under layers/ so a single .gitignore entry covers them:
#   layers/
#   build/

header:
  version: 21

machine: qemuarm64
# nodistro: oe-core is distro-less; kept parallel with the wrynose example.
# Swap to 'poky' (adding meta-yocto) if a poky-distro scarthgap build is wanted.
distro: nodistro
target: core-image-minimal

repos:
  bitbake:
    url: https://git.openembedded.org/bitbake
    branch: "2.8"
    path: layers/bitbake
    # layers: {} clones the repo but adds nothing to bblayers.conf.
    # oe-init-build-env discovers bitbake via its $OEROOT/../bitbake sibling search.
    layers: {}

  openembedded-core:
    url: https://git.openembedded.org/openembedded-core
    branch: scarthgap
    path: layers/openembedded-core
    layers:
      meta:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: scarthgap
    path: layers/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:
